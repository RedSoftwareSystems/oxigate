# docker-compose.yml — Oxigate example environment
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your OAuth2 credentials.
#   2. Run:  make up          (or make up-build for the first run)
#
# Services:
#   backend     — Express REST API  (internal: http://backend:8080)
#   cdn-service — Express + Handlebars CDN  (internal: http://cdn-service:9000)
#   gateway     — Oxigate reverse proxy  (host: :8080 HTTP, :8443 HTTPS)
#
# The three required variables (OAUTH_ISSUER, OAUTH_CLIENT_ID,
# OAUTH_CLIENT_SECRET) are loaded from .env and forwarded to the gateway
# container so that auth.yaml interpolation can resolve them at startup.

services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
    networks:
      - oxigate-net
    # Not exposed to host — accessed only through the gateway.

  cdn-service:
    build:
      context: ./cdn-service
    environment:
      NODE_ENV: production
    networks:
      - oxigate-net
    # Not exposed to host — accessed only through the gateway.

  gateway:
    build:
      context: ../
      dockerfile: example/gateway/Dockerfile
    ports:
      - "8080:8080"
      - "8443:8443"
    env_file:
      - .env
    environment:
      # Values from .env are automatically available; list them explicitly so
      # that Docker Compose validates their presence at startup.
      OAUTH_ISSUER:          ${OAUTH_ISSUER}
      OAUTH_CLIENT_ID:       ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET:   ${OAUTH_CLIENT_SECRET}
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY}
      API_KEY:               ${API_KEY}
      RUST_LOG:              info
    volumes:
      - ./gateway:/etc/oxigate:ro
      - ./certs:/etc/oxigate-tls:ro
    depends_on:
      - backend
      - cdn-service
    networks:
      - oxigate-net

networks:
  oxigate-net:
    driver: bridge
