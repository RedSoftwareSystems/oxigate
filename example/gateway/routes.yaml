# routes.yaml — Reverse proxy route definitions
#
# Each entry maps an inbound request (matched by path and, optionally, HTTP
# method) to an upstream service URL.
#
# Fields
# ------
# name          (required) Unique identifier used in logs and metrics.
# path          (required) How to match the request path — one of:
#                 type: exact   value: /health
#                 type: prefix  value: /api/
#                 type: regex   value: "^/v[0-9]+/.*"
# upstream_url  (optional) Base URL of the upstream (omit for redirect-only routes).
# methods       (optional) Restrict to specific HTTP methods; empty = all.
# scheme        (optional) http | https | any (default). Scheme-specific routes
#               take priority over 'any' routes.
# hostname      (optional) Restrict to a specific Host header value (with optional port).
# match_headers (optional) List of {name, pattern} header matching rules (all must match).
# rewrite       (optional) How to build the upstream path:
#                 pass_through  — forward unchanged (default)
#                 strip_prefix  — remove the matched prefix
#                 !replace /new-path
# redirect      (optional) Short-circuit with a redirect instead of proxying:
#                 type: permanent   (301)
#                 type: temporary   (302)
#                 url: https://...  supports {{env:VAR}} interpolation
# request_headers  (optional) Headers to add/strip before forwarding.
# response_headers (optional) Headers to add/strip before returning.
# client_name   (optional) Name of a client from clients.yaml; if omitted
#               a plain default client is used.
# enabled       (optional, default: true) Set false to disable without removing.

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
# Scheme-specific (scheme: http) so it takes priority over all generic routes.
# Catches every plain HTTP request and permanently redirects to HTTPS.
# GATEWAY_HOSTNAME must be set in .env (e.g. GATEWAY_HOSTNAME=localhost:8443 for local dev).
- name: http-to-https
  scheme: http
  path:
    type: prefix
    value: /
  redirect:
    type: permanent
    url: "https://{{env:GATEWAY_HOSTNAME}}"
  enabled: true

# ── Root ───────────────────────────────────────────────────────────────────────
# Exact match on "/" — proxied to the CDN home page.
- name: root
  path:
    type: exact
    value: /
  upstream_url: "http://cdn-service:9000"
  methods:
    - GET
  request_headers:
    add:
      Authorization: "Bearer {{access_token}}"
      X-Id-Token: "{{id_token}}"
    strip:
      - Cookie
  response_headers:
    strip:
      - X-Internal-Server
  enabled: true

# ── Protected pages ────────────────────────────────────────────────────────────
# Matches /protected/<page> and forwards to the CDN which appends .html.
# The CDN receives the path as-is (e.g. /protected/dashboard) and resolves
# the corresponding /protected/dashboard.html file.
# This route must appear before broader prefix rules to take priority.
- name: protected-pages
  path:
    type: prefix
    value: /protected/
  upstream_url: "http://cdn-service:9000"
  methods:
    - GET
  rewrite: pass_through
  request_headers:
    add:
      Authorization: "Bearer {{access_token}}"
      X-Id-Token: "{{id_token}}"
    strip:
      - Cookie
  response_headers:
    strip:
      - X-Internal-Server
  enabled: true

# ── Health check ───────────────────────────────────────────────────────────────
- name: health-check
  path:
    type: exact
    value: /health
  upstream_url: "http://backend:8080"
  enabled: true

# ── API backend ────────────────────────────────────────────────────────────────
- name: api-backend
  path:
    type: prefix
    value: /api/
  upstream_url: "http://backend:8080"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
  rewrite: strip_prefix
  request_headers:
    add:
      Authorization: "Bearer {{access_token}}"
      X-Id-Token: "{{id_token}}"
      X-Api-Key: "{{env:API_KEY}}"
      X-Forwarded-Prefix: /api
    strip:
      - Cookie
  response_headers:
    strip:
      - X-Internal-Server
  # client_name: secure-backend   # reference a named client from clients.yaml
  enabled: true

# ── Static assets ──────────────────────────────────────────────────────────────
- name: static-assets
  path:
    type: prefix
    value: /static/
  upstream_url: "http://cdn-service:9000"
  rewrite: pass_through
  enabled: true
