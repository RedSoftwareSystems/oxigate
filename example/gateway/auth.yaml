# auth.yaml — OIDC / OAuth2 authentication layer
#
# Referenced by gateway.yaml under config_files.auth.
# All sensitive values are injected at runtime from the .env file via
# {{env:VAR_NAME}} interpolation — never hard-code secrets here.
#
# Endpoint resolution
# -------------------
# The issuer_url triggers OIDC auto-discovery:
#   GET {{env:OAUTH_ISSUER}}/.well-known/openid-configuration
# The authorization and token endpoints are populated automatically.

issuer_url: "{{env:OAUTH_ISSUER}}"

# OAuth2 client credentials (injected from .env at startup).
client:
  id:           "{{env:OAUTH_CLIENT_ID}}"
  secret:       "{{env:OAUTH_CLIENT_SECRET}}"
  redirect_uri: "http://localhost:8080/auth/callback"

# Session cookie encryption key (injected from .env at startup).
# Must be at least 32 characters.  Generate with: openssl rand -base64 48
private_cookie_key: "{{env:COOKIE_ENCRYPTION_KEY}}"

# Session and token lifetime.
session:
  max_age_minutes:       30   # session duration
  token_max_age_seconds: 300  # force refresh after 5 minutes (optional)

# OAuth2 scopes to request.
scopes:
  - openid
  - email
  - profile

# PKCE code challenge method: s256 (recommended) or plain.
code_challenge_method: s256

# Authentication route configuration.
routes:
  base_path:                /auth  # mounts GET /auth, /auth/callback, /auth/logout
  post_logout_redirect_uri: /      # redirect here after logout
  token_request_redirect_uri: true # include redirect_uri in token request (RFC 6749)

# TLS for the HTTP client used to talk to the OIDC provider (optional).
# provider_tls:
#   custom_ca_cert: /etc/oxigate/tls/provider-ca.pem
