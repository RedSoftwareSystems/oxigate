# gateway.yaml — Oxigate main configuration
#
# Controls which TCP listeners to open, where to find the route / client /
# auth config files, and the minimum log level.
#
# Sensitive values (OAUTH_ISSUER, OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET,
# COOKIE_ENCRYPTION_KEY, API_KEY) are read from the .env file at startup
# via {{env:VAR_NAME}} interpolation in the referenced YAML files.

# Plain HTTP listener.
http:
  bind:
    address: "0.0.0.0"
    port: 8080

# HTTPS listener with TLS and HTTP/2.
https:
  bind:
    address: "0.0.0.0"
    port: 8443
  server_identity:
    format: pem
    cert: /etc/oxigate-tls/server.crt
    key:  /etc/oxigate-tls/server.key
  # Mutual TLS — uncomment to require client certificates:
  # client_auth:
  #   ca_cert: /etc/oxigate-tls/client-ca.pem
  #   require: true
  http2: true

# Paths to the individual configuration files.
config_files:
  routes:  /etc/oxigate/routes.yaml
  clients: /etc/oxigate/clients.yaml
  auth:    /etc/oxigate/auth.yaml

# Minimum log level: trace | debug | info | warn | error
log_level: info
